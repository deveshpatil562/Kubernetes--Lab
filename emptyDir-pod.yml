apiVersion: v1
kind: Pod
metadata:
  name: emptydir-demo
spec:
  containers: 
    - name: writer
      image: busybox
      command: ["/bin/sh", "-c"]
      args:
        - while true; do
            date >> /data/message.txt;
            sleep 10;
          done
      volumeMounts:
        - name: data-volume
          mountPath: /data/
  volumes:
    - name: data-volume
      emptyDir: {}