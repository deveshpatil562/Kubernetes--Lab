apiVersion: v1
kind: Pod
metadata:
  name: pvc-pod-demo
spec:
  containers:
    - name: writer
      image: busybox
      command: ["/bin/sh", "-c"]
      args:
        - while true; do
            echo "Pod $(hostname) wrote at $(date)" >> /data/message.txt;
            sleep 10;
          done
      volumeMounts:
        - name: data-volume
          mountPath: /data
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: pvc-demo    
          