apiVersion: v1
kind: Pod
metadata:
  name: configmap-demo-pod
spec:
  containers:
    - name: app-container
      image: busybox
      command: ["/bin/sh", "-c"]
      args:
        - while true; do
            cat /etc/live-config/message;
            echo "------"
            sleep 5;
          done
      volumeMounts:
        - name: config-volume
          mountPath: /etc/live-config
          readOnly: true
  volumes:
    - name: config-volume
      configMap:
        name: live-config

